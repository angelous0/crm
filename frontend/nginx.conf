server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip — acelera carga del bundle
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # Cache largo para assets estáticos (CSS/JS con hash en el nombre)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy de /api/* hacia el backend del CRM
    # En EasyPanel: el hostname del container backend (ej: crm-backend)
    # se resuelve por DNS interno del network del proyecto.
    location /api/ {
        proxy_pass http://crm-backend:8004;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts: los endpoints lentos del CRM pueden tomar varios segundos
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # Todo lo demás → SPA fallback (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No cachear el index.html (asegura que siempre sirva la versión nueva
    # cuando hagamos deploy de un build nuevo)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
