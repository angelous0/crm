server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip — acelera carga del bundle
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # Cache largo para assets estáticos (CSS/JS con hash en el nombre)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # NOTA sobre /api/ proxy:
    # Este frontend NO proxea /api/* al backend. El backend tiene su propio
    # dominio público (REACT_APP_BACKEND_URL inyectado en build-time) y el
    # browser hace requests CORS directos al backend con CORS_ORIGINS=*.
    # Mismo patrón que ventas_frontend y odoo_frontend.
    #
    # Si en el futuro se quiere usar proxy interno (patrón A — backend NO
    # público, frontend proxea /api):
    #   1) Agregar bloque `location /api/ { proxy_pass http://<HOSTNAME>:8004; ... }`
    #      donde <HOSTNAME> debe ser el nombre interno del container, ej:
    #      `datos_crm_backend` (formato <proyecto>_<servicio> en EasyPanel).
    #   2) Configurar el backend SIN dominio público.
    #   3) Cambiar REACT_APP_BACKEND_URL a vacío o al mismo dominio del frontend.

    # SPA fallback (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No cachear el index.html (asegura que siempre sirva la versión nueva
    # cuando hagamos deploy de un build nuevo)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
